version: "3.9"

services:

  registry-service:
    build: ./services/registry-service
    ports:
      - "8001:8000"
    environment:
      AWS_REGION: eu-west-1
      STACKS_TABLE: vuln-stacks-dev
      USERS_TABLE: vuln-users-dev
      JWT_SECRET: dev-secret-change-in-production
      AWS_PROFILE: default
    volumes:
      - ~/.aws:/root/.aws:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  scanner-service:
    build: ./services/scanner-service
    environment:
      AWS_REGION: eu-west-1
      STACKS_TABLE: vuln-stacks-dev
      FINDINGS_TABLE: vuln-findings-dev
      SQS_QUEUE_URL: https://sqs.eu-west-1.amazonaws.com/${account_id}/vuln-findings-dev
      S3_BUCKET: vuln-alert-findings-${account_id}
      AWS_PROFILE: default
    volumes:
      - ~/.aws:/root/.aws:ro
    depends_on:
      - registry-service

  alert-service:
    build: ./services/alert-service
    environment:
      AWS_REGION: eu-west-1
      SQS_QUEUE_URL: https://sqs.eu-west-1.amazonaws.com/${account_id}/vuln-findings-dev
      SNS_TOPIC_ARN: arn:aws:sns:eu-west-1:${account_id}:vuln-alerts-dev
      SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/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"
      AWS_PROFILE: default
    volumes:
      - ~/.aws:/root/.aws:ro
    depends_on:
      - scanner-service